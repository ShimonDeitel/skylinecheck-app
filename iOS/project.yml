name: Skylinecheck
options:
  bundleIdPrefix: com.shimondeitel.skylinecheck
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Skylinecheck:
    type: application
    platform: iOS
    sources:
      - path: Skylinecheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.skylinecheck
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Skylinecheck/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SkylinecheckTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SkylinecheckTests
      - path: Skylinecheck.storekit
    dependencies:
      - target: Skylinecheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.skylinecheck.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SkylinecheckUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SkylinecheckUITests
    dependencies:
      - target: Skylinecheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.skylinecheck.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Skylinecheck:
    build:
      targets:
        Skylinecheck: all
        SkylinecheckTests: [test]
        SkylinecheckUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Skylinecheck.storekit
    test:
      config: Debug
      storeKitConfiguration: Skylinecheck.storekit
      targets:
        - SkylinecheckTests
        - SkylinecheckUITests
    archive:
      config: Release
